<!DOCTYPE html>
<html>
<head>
<title> Calculator</title>

<style>

body{
height:100vh;
display:flex;
justify-content:center;
align-items:center;

/* NEW BACKGROUND */
background:linear-gradient(135deg,#1d2671,#c33764);

font-family:Arial;
}

.calculator{
background:#ffffff;
padding:20px;
border-radius:12px;
box-shadow:0 5px 15px black;
}

#screen{
width:100%;
height:45px;
font-size:20px;
margin-bottom:10px;
text-align:right;
padding:5px;
border:2px solid #333;
}

.buttons{
display:grid;
grid-template-columns:repeat(4,60px);
gap:8px;
}

button{
height:45px;
font-size:16px;
border:none;
border-radius:6px;
cursor:pointer;
color:white;
}

.num{ background:#3498db; }
.op{ background:#e67e22; }
.eq{ background:#2ecc71; }
.cl{ background:#e74c3c; }

button:hover{
opacity:0.8;
}

</style>
</head>

<body>

<div class="calculator">

<input type="text" id="screen">

<div class="buttons">

<button class="cl" onclick="clr()">C</button>
<button class="op" onclick="del()">←</button>
<button class="op" onclick="add('%')">%</button>
<button class="op" onclick="add('/')">/</button>

<button class="num" onclick="add('7')">7</button>
<button class="num" onclick="add('8')">8</button>
<button class="num" onclick="add('9')">9</button>
<button class="op" onclick="add('*')">*</button>

<button class="num" onclick="add('4')">4</button>
<button class="num" onclick="add('5')">5</button>
<button class="num" onclick="add('6')">6</button>
<button class="op" onclick="add('-')">-</button>

<button class="num" onclick="add('1')">1</button>
<button class="num" onclick="add('2')">2</button>
<button class="num" onclick="add('3')">3</button>
<button class="op" onclick="add('+')">+</button>

<button class="num" onclick="add('0')">0</button>
<button class="num" onclick="add('.')">.</button>
<button class="eq" onclick="ans()">=</button>

</div>

</div>

<script>

function add(x){
document.getElementById("screen").value += x;
}

function clr(){
document.getElementById("screen").value="";
}

function del(){
let s=document.getElementById("screen");
s.value=s.value.slice(0,-1);
}

function ans(){
try{
document.getElementById("screen").value =
eval(document.getElementById("screen").value);
}
catch{
alert("Error");
}
}

</script>

</body>
</html>
